  postgresql:
    container_name: acn-db
    image: postgres:18.2-alpine
    restart: always
    environment: 
      POSTGRES_DB: acn
      POSTGRES_USER: acn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: 
      - ./docker/db_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - acn-net

  redis:
    container_name: acn-redis
    image: redis:8-alpine
    restart: always
    command: redis-server --appendonly yes
    ports:
      - ${REDIS_PORT}:6379
    networks:
      - acn-net
    volumes:
      - redis-data:/data

networks:
  acn-net:
    name: acn-network

volumes:
  redis-data: